name: Deploy Vite site to Pages

on:
  # 每次推送到 main 分支时触发
  push:
    branches: ["main"]
  # 允许你在 Actions 标签页手动运行
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 指定 Node 版本
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: frontend # 在 frontend 目录下安装依赖
      - name: Build
        run: npm run build
        working-directory: frontend # 在 frontend 目录下打包
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
                path: frontend/dist # 指定打包输出的文件夹

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
